name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

# One deploy at a time per PR; a newer push supersedes an in-flight deploy.
concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  preview:
    runs-on: ubuntu-latest
    # Same-repo PRs only. Fork PRs can't read secrets anyway, and we don't want untrusted
    # code deployed onto our Fly org.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: pr-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      # Creates/updates the app on open & sync, destroys it on close — all driven by the
      # PR event type. ARBOR_PREVIEW_TOKEN is set as a Fly secret so the app boots behind
      # the private token gate.
      - id: deploy
        uses: superfly/fly-pr-review-apps@1.6.0
        with:
          name: arbor-pr-${{ github.event.number }}
          config: fly.toml
          secrets: ARBOR_PREVIEW_TOKEN=${{ secrets.ARBOR_PREVIEW_TOKEN }}

      # The action doesn't comment, so post (or update) one with the URL. The token is
      # deliberately NOT included in the comment — append ?token=<ARBOR_PREVIEW_TOKEN>
      # once and the cookie keeps you authenticated for the preview's lifetime.
      - name: Comment preview URL
        if: github.event.action != 'closed' && steps.deploy.outputs.url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- arbor-preview -->';
            const body = `${marker}\n🌳 **Arbor preview is live:** ${url}\n\n` +
              `Append \`?token=<your ARBOR_PREVIEW_TOKEN>\` to the URL once to unlock it ` +
              `(a cookie keeps you signed in). It opens pre-connected to a seeded sandbox ` +
              `repo so you can test right away — add an Anthropic key and a GitHub PAT in ` +
              `Settings to exercise the planner and GitHub flow. Tears down automatically ` +
              `when this PR closes.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
