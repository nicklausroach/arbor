# Base config for Arbor PR preview apps. The fly-pr-review-apps action overrides the app
# name per PR (arbor-pr-<n>); everything else below is shared by every preview.

app = "arbor-pr-preview"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero between visits — previews are idle most of the time, so don't pay to
  # keep a machine running. Fly cold-starts it on the next request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    # Exempt from the preview token gate, so the load balancer can health-check it.
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
